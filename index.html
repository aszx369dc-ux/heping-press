<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>和平出版社｜奇聞軼事</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="home" class="home">
    <div class="home-bg"></div>
    <nav class="home-nav">
      <span>和平出版社</span>
      <a href="#library">進入書本</a>
    </nav>
    <div class="home-inner">
      <p class="eyebrow">Heping Press Digital Library</p>
      <h1>奇聞軼事</h1>
      <p class="home-lead">故事會結束，但成長不會。</p>
      <div class="home-actions">
        <button id="startReading" class="primary">開始閱讀</button>
        <a class="secondary" href="#catalog">查看目錄</a>
      </div>
    </div>
  </section>

  <section id="library" class="book-intro">
    <div class="book-cover">
      <p>楓香故事集</p>
      <h2>奇聞軼事</h2>
      <span>2025-2026</span>
    </div>
    <div class="book-about">
      <p class="eyebrow">About this book</p>
      <h2>一本由孩子共同打造的和平怪奇宇宙</h2>
      <p>這裡收錄《奇聞軼事》全 36 篇故事。家長可以依照章節閱讀，也可以直接從第一篇開始，一頁一頁翻到最後。</p>
      <div id="bookStats" class="stats"></div>
    </div>
  </section>

  <section id="readerApp" class="app">
    <aside class="sidebar" id="sidebar">
      <div class="side-head">
        <button id="closeMenu" class="small-btn">關閉</button>
        <p class="eyebrow">目錄</p>
        <h2>奇聞軼事</h2>
        <input id="searchInput" type="search" placeholder="搜尋故事、作者、章節…" />
        <div class="filter-row">
          <button class="filter active" data-filter="all">全部</button>
          <button class="filter" data-filter="featured">精選</button>
        </div>
      </div>
      <nav id="catalog"></nav>
    </aside>

    <main class="reader">
      <header class="reader-top">
        <button id="menuBtn" class="small-btn">目錄</button>
        <div class="reader-title">
          <p id="chapterLabel" class="eyebrow"></p>
          <h2 id="storyTitle"></h2>
          <p id="storyMeta"></p>
        </div>
        <button id="focusBtn" class="small-btn">專注</button>
      </header>

      <section class="stage">
        <button id="prevTurn" class="turn">‹</button>
        <figure class="page">
          <img id="pageImg" alt="故事頁面" />
          <figcaption id="pageCaption"></figcaption>
        </figure>
        <button id="nextTurn" class="turn">›</button>
      </section>

      <section class="controls">
        <button id="prevStory">上一篇</button>
        <button id="prevPage">上一頁</button>
        <span id="progress"></span>
        <button id="nextPage">下一頁</button>
        <button id="nextStory">下一篇</button>
      </section>

      <section id="endCard" class="end-card hidden">
        <p class="eyebrow">Reading completed</p>
        <h2>這篇讀完了</h2>
        <p id="nextStoryHint"></p>
        <button id="goNextStory" class="primary">閱讀下一篇</button>
      </section>
    </main>
  </section>

  <footer>
    <p>和平出版社｜2025-2026 楓香班</p>
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
